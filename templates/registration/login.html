{% extends "base.html" %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-card__header">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="6" fill="#c0152a"/>
            <rect x="13" y="6" width="6" height="20" rx="2" fill="white"/>
            <rect x="6" y="13" width="20" height="6" rx="2" fill="white"/>
        </svg>
        <h1>MediResponse</h1>
        <p>Ambulance Booking &amp; Dispatch System</p>
    </div>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert alert--error">Invalid username or password. Please try again.</div>
        {% endif %}

        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" required autofocus placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn--primary btn--full">Sign In</button>
    </form>

    <p class="auth-card__footer">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
{% endblock %}
